<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="Jeff Otterson — I build governed AI agent systems, and the gates that prove they work.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1A"/>
      <stop offset="55%" stop-color="#0E1626"/>
      <stop offset="100%" stop-color="#131D31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#7DD3FC" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.78" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round"><rect width="1280" height="360" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1280" height="360" fill="url(#bg)"/>
    <rect width="1280" height="360" fill="url(#grid)"/>
    <rect width="1280" height="360" fill="url(#glow)"/>
    <rect x="0" y="0" width="4" height="360" fill="url(#fade)"/>

    <!-- ── left: identity ─────────────────────────────────────── -->
    <text x="64" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="13" letter-spacing="3.4" fill="#38BDF8" fill-opacity="0.85">
      AGENT INFRASTRUCTURE · EVALUATION · GOVERNANCE
    </text>

    <text x="62" y="146" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="56" font-weight="700" letter-spacing="-1.2" fill="#F1F5F9">
      Jeff Otterson
    </text>

    <rect x="64" y="170" width="64" height="3" rx="1.5" fill="url(#accent)"/>

    <text x="64" y="212" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="21" font-weight="500" fill="#CBD5E1">
      I build governed AI agent systems — and the gates that prove they work.
    </text>

    <text x="64" y="243" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16" fill="#64748B">
      Architecture, evals, and the receipts. Nothing ships on a hope.
    </text>

    <!-- chips -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#94A3B8">
      <rect x="64"  y="277" width="146" height="30" rx="15" fill="#38BDF8" fill-opacity="0.07" stroke="#38BDF8" stroke-opacity="0.28"/>
      <text x="137" y="296" text-anchor="middle" fill="#7DD3FC">agent infra</text>

      <rect x="220" y="277" width="164" height="30" rx="15" fill="#818CF8" fill-opacity="0.07" stroke="#818CF8" stroke-opacity="0.28"/>
      <text x="302" y="296" text-anchor="middle" fill="#A5B4FC">mutation testing</text>

      <rect x="394" y="277" width="150" height="30" rx="15" fill="#34D399" fill-opacity="0.07" stroke="#34D399" stroke-opacity="0.26"/>
      <text x="469" y="296" text-anchor="middle" fill="#6EE7B7">guarded RAG</text>

      <rect x="554" y="277" width="140" height="30" rx="15" fill="#FBBF24" fill-opacity="0.07" stroke="#FBBF24" stroke-opacity="0.26"/>
      <text x="624" y="296" text-anchor="middle" fill="#FCD34D">cost telemetry</text>
    </g>

    <!-- ── right: the governed stack glyph ────────────────────── -->
    <g transform="translate(866, 62)">
      <!-- layer plates -->
      <g stroke-width="1.2">
        <rect x="24"  y="0"   width="300" height="42" rx="8" fill="#1E293B" fill-opacity="0.55" stroke="#38BDF8" stroke-opacity="0.35"/>
        <rect x="24"  y="56"  width="300" height="42" rx="8" fill="#1E293B" fill-opacity="0.55" stroke="#818CF8" stroke-opacity="0.35"/>
        <rect x="24"  y="112" width="300" height="42" rx="8" fill="#1E293B" fill-opacity="0.55" stroke="#34D399" stroke-opacity="0.35"/>
        <rect x="24"  y="168" width="300" height="42" rx="8" fill="#1E293B" fill-opacity="0.55" stroke="#FBBF24" stroke-opacity="0.35"/>
      </g>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">
        <text x="44" y="26"  fill="#7DD3FC">orchestration</text>
        <text x="44" y="82"  fill="#A5B4FC">verification</text>
        <text x="44" y="138" fill="#6EE7B7">retrieval</text>
        <text x="44" y="194" fill="#FCD34D">telemetry</text>
      </g>

      <!-- right-side status ticks -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#475569" text-anchor="end">
        <text x="306" y="26"  fill="#64748B">fleet-mode</text>
        <text x="306" y="82"  fill="#64748B">crucible</text>
        <text x="306" y="138" fill="#64748B">rag-guard</text>
        <text x="306" y="194" fill="#64748B">cost-meter</text>
      </g>

      <!-- spine + gate -->
      <path d="M12 21 V 189" stroke="#334155" stroke-width="1.5"/>
      <circle cx="12" cy="21"  r="4" fill="#38BDF8"/>
      <circle cx="12" cy="77"  r="4" fill="#818CF8"/>
      <circle cx="12" cy="133" r="4" fill="#34D399"/>
      <circle cx="12" cy="189" r="4" fill="#FBBF24"/>

      <!-- gate at the bottom: fail-closed -->
      <rect x="24" y="228" width="300" height="40" rx="8" fill="#0F172A" fill-opacity="0.8" stroke="#F87171" stroke-opacity="0.4" stroke-dasharray="4 3"/>
      <text x="174" y="253" text-anchor="middle"
            font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#FCA5A5">
        gate: fails closed
      </text>
    </g>
  </g>
</svg>
